name: Release precompiled NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16", "2.17"]
        job:
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-apple-darwin, os: macos-14 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }

    steps:
      - uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Add Rust target (macOS)
        if: runner.os == 'macOS'
        run: |
          rustup default stable
          rustup target add ${{ matrix.job.target }}

      - name: Use GNU tar on macOS
        if: runner.os == 'macOS'
        run: |
          brew install gnu-tar
          echo "PATH=$(brew --prefix gnu-tar)/libexec/gnubin:$PATH" >> $GITHUB_ENV

      - name: Build precompiled NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: ex_data_sketch_nif
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross || '' }}
          cross-version: from-source
          project-dir: "native/ex_data_sketch_nif"

      - name: Upload NIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

  release:
    name: Create GitHub Release
    needs: build_release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Flatten tarballs
        run: |
          mkdir -p nifs
          find release-artifacts -name '*.tar.gz' -exec cp {} nifs/ \;
          ls -la nifs/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nifs/*.tar.gz
          generate_release_notes: true

  publish_hex:
    name: Publish to Hex.pm
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - run: mix deps.get

      - name: Generate checksums from GitHub Release
        run: mix rustler_precompiled.download ExDataSketch.Nif --all --print

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
