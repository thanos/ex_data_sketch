name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  EX_DATA_SKETCH_SKIP_NIF: "true"

jobs:
  lint:
    name: Format & Credo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-test-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: build-test-1.19-28-

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix docs --warnings-as-errors
        env:
          MIX_ENV: dev

  compile:
    name: Compile (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.18"
            otp: "28"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20.0-rc.1"
            otp: "28"
            experimental: true
          - elixir: "1.20.0-rc.1"
            otp: "29.0-rc1"
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors

  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.18"
            otp: "28"
          - elixir: "1.19"
            otp: "28"
            coverage: true
          - elixir: "1.20.0-rc.1"
            otp: "28"
            experimental: true
          - elixir: "1.20.0-rc.1"
            otp: "29.0-rc1"
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: mix test

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: mix coveralls.json

      - name: Check coverage threshold
        if: ${{ matrix.coverage }}
        run: mix run ci/compare_coverage.exs

      - name: Upload coverage artifact
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover/

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        id: setup-beam
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-dev-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: build-dev-1.19-28-

      - name: Cache PLTs
        id: plt-cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ steps.setup-beam.outputs.elixir-version }}-${{ steps.setup-beam.outputs.otp-version }}-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mkdir -p priv/plts

      - name: Remove stale PLT on cache miss
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: rm -f priv/plts/dialyzer.plt

      - run: mix dialyzer

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-dev-bench-1.17-27-${{ hashFiles('mix.lock') }}
          restore-keys: build-dev-bench-1.17-27-

      - run: mix deps.get

      - name: Run HLL benchmarks
        run: mix run bench/hll_bench.exs
        continue-on-error: true

      - name: Run CMS benchmarks
        run: mix run bench/cms_bench.exs
        continue-on-error: true

      - name: Run Theta benchmarks
        run: mix run bench/theta_bench.exs
        continue-on-error: true

      - name: Check benchmark regressions
        run: mix run ci/compare_bench.exs
        continue-on-error: true

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench/output/

  test-rust:
    name: Test with Rust NIF
    runs-on: ubuntu-latest
    env:
      EX_DATA_SKETCH_BUILD: "true"
      EX_DATA_SKETCH_SKIP_NIF: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-test-rust-1.19-28-${{ hashFiles('mix.lock') }}-${{ hashFiles('native/ex_data_sketch_nif/Cargo.lock') }}
          restore-keys: build-test-rust-1.19-28-

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: native/ex_data_sketch_nif/target
          key: rust-target-${{ hashFiles('native/ex_data_sketch_nif/Cargo.lock') }}
          restore-keys: rust-target-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test

  bench-rust:
    name: Benchmarks (with Rust NIF)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      MIX_ENV: dev
      EX_DATA_SKETCH_BUILD: "true"
      EX_DATA_SKETCH_SKIP_NIF: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-dev-rust-1.19-28-${{ hashFiles('mix.lock') }}-${{ hashFiles('native/ex_data_sketch_nif/Cargo.lock') }}
          restore-keys: build-dev-rust-1.19-28-

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: native/ex_data_sketch_nif/target
          key: rust-target-dev-${{ hashFiles('native/ex_data_sketch_nif/Cargo.lock') }}
          restore-keys: rust-target-dev-

      - run: mix deps.get

      - name: Run HLL benchmarks (Pure vs Rust)
        run: mix run bench/hll_bench.exs
        continue-on-error: true

      - name: Run CMS benchmarks (Pure vs Rust)
        run: mix run bench/cms_bench.exs
        continue-on-error: true

      - name: Run Theta benchmarks (Pure vs Rust)
        run: mix run bench/theta_bench.exs
        continue-on-error: true

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-rust
          path: bench/output/
