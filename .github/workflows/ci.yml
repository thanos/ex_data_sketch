name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

jobs:
  lint:
    name: Format & Credo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-test-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: build-test-1.19-28-

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix credo --strict

  compile:
    name: Compile (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.18"
            otp: "28"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20.0-rc.1"
            otp: "28"
            experimental: true
          - elixir: "1.20.0-rc.1"
            otp: "29.0-rc1"
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors

  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.18"
            otp: "28"
          - elixir: "1.19"
            otp: "28"
            coverage: true
          - elixir: "1.20.0-rc.1"
            otp: "28"
            experimental: true
          - elixir: "1.20.0-rc.1"
            otp: "29.0-rc1"
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: mix test

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: mix coveralls.json

      - name: Check coverage threshold
        if: ${{ matrix.coverage }}
        run: mix run ci/compare_coverage.exs

      - name: Upload coverage artifact
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover/

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-dev-1.17-27-${{ hashFiles('mix.lock') }}
          restore-keys: build-dev-1.17-27-

      - name: Cache PLTs
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-1.17-27-${{ hashFiles('mix.lock') }}
          restore-keys: plt-1.17-27-

      - run: mix deps.get
      - run: mkdir -p priv/plts
      - run: mix dialyzer

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-dev-bench-1.17-27-${{ hashFiles('mix.lock') }}
          restore-keys: build-dev-bench-1.17-27-

      - run: mix deps.get

      - name: Run HLL benchmarks
        run: mix run bench/hll_bench.exs
        continue-on-error: true

      - name: Run CMS benchmarks
        run: mix run bench/cms_bench.exs
        continue-on-error: true

      - name: Check benchmark regressions
        run: mix run ci/compare_bench.exs
        continue-on-error: true

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench/output/
